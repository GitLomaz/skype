# Optional: Cloud Build configuration for CI/CD
# This will build and push the container image
# You can deploy manually from Cloud Run console after the image is built

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/skype-chat:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/skype-chat:$COMMIT_SHA']

images:
  - 'gcr.io/$PROJECT_ID/skype-chat:$COMMIT_SHA'

# Note: Deployment is done via Cloud Run Console
# Configure secrets in the Console under "Variables & Secrets" tab
